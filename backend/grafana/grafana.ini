# Grafana config — local observability stack
# Paths that need the repo root (paths.provisioning, paths.data) are injected
# via GF_PATHS_* env vars in the Makefile so no absolute path is baked here.

[server]
http_port = 3000

[security]
admin_user     = admin
admin_password = admin

[analytics]
reporting_enabled    = false
check_for_updates    = false
check_for_plugin_updates = false

[log]
mode  = console
level = warn
